<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Apeswico | 플래시카드</title>
    <meta
      name="description"
      content="스페인어 어휘 SRS 학습을 위한 플래시카드 셸입니다."
    />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f4efe8;
        --bg-deep: #eadfce;
        --surface: rgba(255, 255, 255, 0.8);
        --surface-strong: rgba(255, 255, 255, 0.96);
        --text: #201910;
        --muted: #66594d;
        --accent: #8a4f1d;
        --accent-strong: #6c3d15;
        --border: rgba(32, 25, 16, 0.12);
        --shadow: 0 18px 40px rgba(72, 44, 18, 0.12);
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #14110f;
          --bg-deep: #1d1714;
          --surface: rgba(32, 26, 22, 0.84);
          --surface-strong: rgba(40, 33, 28, 0.98);
          --text: #f5ece2;
          --muted: #c9b8aa;
          --accent: #ef9b54;
          --accent-strong: #ffb46f;
          --border: rgba(245, 236, 226, 0.12);
          --shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Apple SD Gothic Neo",
          "Noto Sans KR",
          sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top left, rgba(138, 79, 29, 0.18), transparent 34%),
          radial-gradient(circle at top right, rgba(239, 155, 84, 0.12), transparent 28%),
          linear-gradient(180deg, var(--bg), var(--bg-deep));
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0 48px;
      }

      .masthead {
        display: grid;
        gap: 20px;
        grid-template-columns: 1.3fr 1fr;
        align-items: start;
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0 0 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 0.76rem;
        color: var(--muted);
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      h1 {
        margin-bottom: 12px;
        font-size: clamp(2.2rem, 4vw, 4rem);
        line-height: 0.96;
      }

      .lede {
        max-width: 60ch;
        margin-bottom: 0;
        font-size: 1.02rem;
        line-height: 1.75;
        color: var(--muted);
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 10px;
      }

      .nav a {
        padding: 0.76rem 1rem;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: var(--surface);
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 24px rgba(32, 25, 16, 0.06);
        font-weight: 650;
      }

      .nav a[aria-current="page"] {
        background: var(--accent);
        border-color: transparent;
        color: white;
      }

      .stack {
        display: grid;
        gap: 16px;
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--surface-strong);
        padding: 22px;
        box-shadow: var(--shadow);
      }

      .card h2 {
        margin-bottom: 0.75rem;
        font-size: 1.2rem;
      }

      .placeholder {
        display: grid;
        place-items: center;
        min-height: 220px;
        border: 1px dashed rgba(138, 79, 29, 0.3);
        border-radius: 20px;
        color: var(--muted);
        text-align: center;
        padding: 20px;
      }

      .mount {
        display: grid;
        gap: 12px;
      }

      .chip {
        display: inline-flex;
        width: fit-content;
        padding: 0.34rem 0.68rem;
        border-radius: 999px;
        background: rgba(138, 79, 29, 0.1);
        color: var(--accent-strong);
        font-size: 0.78rem;
        font-weight: 700;
      }

      @media (max-width: 980px) {
        .masthead {
          grid-template-columns: 1fr;
        }

        .nav {
          justify-content: flex-start;
        }
      }

      @media (max-width: 720px) {
        .page {
          width: min(100% - 20px, 1120px);
          padding-top: 14px;
        }

        .card {
          border-radius: 20px;
          padding: 18px;
        }

        h1 {
          font-size: clamp(1.9rem, 12vw, 3rem);
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header class="masthead">
        <div>
          <p class="eyebrow">Flashcards shell</p>
          <h1>어휘 SRS</h1>
          <p class="lede">
            지금은 카드 교체와 평가 로직이 들어갈 자리만 잡아 둔 셸입니다.
            다음 단계에서 공용 저장소와 SRS 엔진을 연결합니다.
          </p>
        </div>
        <nav class="nav" aria-label="주요 모드">
          <a href="index.html">홈</a>
          <a href="flashcards.html" aria-current="page">플래시카드</a>
          <a href="grammar.html">문법</a>
          <a href="reading.html">독해</a>
          <a href="situations.html">상황극</a>
        </nav>
      </header>

      <main class="stack" id="flashcards-shell">
        <section class="card">
          <span class="chip">마운트 지점</span>
          <h2>flashcards-app</h2>
          <div id="flashcards-app" class="placeholder">
            카드 앞면, 뒷면, 평가 버튼, 단축키 안내가 이곳에 렌더링됩니다.
          </div>
        </section>

        <section class="card mount">
          <span class="chip">미리보기 레이아웃</span>
          <h2>학습 흐름</h2>
          <div class="placeholder">문제 카드 → 뒤집기 → 평가 → 다음 카드</div>
        </section>
      </main>
    </div>
    <script type="module" src="js/flashcards.js"></script>
  </body>
</html>
